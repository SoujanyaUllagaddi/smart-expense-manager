<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h2 class="mb-3">✏️ Edit Expense</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control" value="{{ expense.title }}">
                    </div>
                    <div class="mb-3">
                        <input type="number" name="amount" class="form-control" value="{{ expense.amount }}">
                    </div>
                    <div class="mb-3">
                        <input type="text" name="category" class="form-control" value="{{ expense.category }}">
                    </div>
                    <div class="mb-3">
                        <input type="date" name="date" class="form-control" value="{{ expense.date }}">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Update</button>
                </form>
                <a href="/" class="btn btn-secondary w-100 mt-2">Cancel</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
